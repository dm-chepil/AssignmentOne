<div class="container">
  <h1 class="mb-4">Edit Video Game</h1>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="loadError" class="alert alert-danger">
    Failed to load video game. Please try again later.
  </div>

  <ng-container *ngIf="!loading && !loadError && game">
    <form (ngSubmit)="onSubmit()" #editForm="ngForm">
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input
          id="name"
          name="name"
          type="text"
          class="form-control"
          [(ngModel)]="name"
          required
        />
      </div>

      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea
          id="description"
          name="description"
          class="form-control"
          rows="4"
          [(ngModel)]="description"
          required
        ></textarea>
      </div>

      <div *ngIf="saveSuccess" class="alert alert-success">
        Video game updated successfully.
      </div>

      <div *ngIf="saveError" class="alert alert-danger">
        Failed to save changes. Please try again.
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" [disabled]="saving || editForm.invalid">
          <span *ngIf="saving" class="spinner-border spinner-border-sm me-2" role="status"></span>
          Save
        </button>
        <a routerLink="/" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </ng-container>
</div>
